<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <title>Lestrarapp</title>
</head>
<body style="font-family: sans-serif; text-align:center; padding:40px;">

<h2>Lestrarapp</h2>

<button id="startBtn">Byrja að lesa</button>
<div id="timer" style="font-size:32px; margin-top:20px;">0:00</div>

<div style="font-size:12px; opacity:0.6; margin-top:10px;">
  v4 — timer fixed (clean baseline)
</div>

<script>
let startTime = null;
let timerInterval = null;

const startBtn = document.getElementById("startBtn");
const timerEl = document.getElementById("timer");

startBtn.onclick = async () => {
  try {
    // Ask for mic
    await navigator.mediaDevices.getUserMedia({ audio: true });

    // Start session immediately after permission
    startSession();

  } catch (e) {
    alert("Míkrafón leyfi þarf til að byrja");
  }
};

function startSession() {
  startTime = Date.now();

  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    timerEl.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  }, 1000);

  console.log("BUILD v4 — timer running");
}
</script>

</body>
</html>
