<script>

const firebaseConfig = {

let db = null;
function initFirebase() {
  if (db) return db;
  if (!window.firebase) throw new Error('Firebase scripts hlóðust ekki. Prófaðu hard refresh eða athugaðu Network tab.');
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  return db;
}

const ADMIN_CODE = 'ADMIN001';
const PAGE_SIZE = 50;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════

let _sessions = [];
let _families = {};
let _lastDoc = null;
let _hasMore = true;
let _totalCount = 0;
let _activeTab = 'overview';

// ══════════════════════════════════════════
// ADMIN — metrics extraction (new seven metrics)
// ══════════════════════════════════════════

function getMetrics(s) {
  const snippets = s.analysis?.snippets || {};
  const usable = [
    snippets.min1, snippets.min2, snippets.min5, snippets.min8, snippets.min10,
    snippets.min4, snippets.min7, snippets.min9, snippets.min13
  ].filter(sn => sn && sn.usable);

  if (!usable.length) return {
    syllables: 0, cleanReadingPct: 0, articulationRate: 0, speechRate: 0,
    formantVariation: 0, meanF1Variation: 0, meanF2Variation: 0
  };

  // Read from summary object if available, fall back to legacy flat fields
  const val = (sn, key, legacyKey) => {
    if (sn.summary && sn.summary[key] != null) return sn.summary[key];
    if (legacyKey && sn[legacyKey] != null) return sn[legacyKey];
    return 0;
  };

  return {
    syllables: Math.round(usable.reduce((a, sn) => a + val(sn, 'syllables', 'praatSyllables'), 0) / usable.length),
    cleanReadingPct: Number((usable.reduce((a, sn) => a + val(sn, 'cleanReadingPct'), 0) / usable.length).toFixed(1)),
    articulationRate: Number((usable.reduce((a, sn) => a + val(sn, 'articulationRate'), 0) / usable.length).toFixed(2)),
    speechRate: Number((usable.reduce((a, sn) => a + val(sn, 'speechRate'), 0) / usable.length).toFixed(2)),
    formantVariation: Number((usable.reduce((a, sn) => a + val(sn, 'formantVariation'), 0) / usable.length).toFixed(1)),
    meanF1Variation: Number((usable.reduce((a, sn) => a + val(sn, 'meanF1Variation'), 0) / usable.length).toFixed(1)),
    meanF2Variation: Number((usable.reduce((a, sn) => a + val(sn, 'meanF2Variation'), 0) / usable.length).toFixed(1))
  };
}

// Profile classification — based on articulation rate as primary indicator
function getProfile(m) {
  if (!m.syllables && !m.articulationRate) return 'unknown';
  if (m.articulationRate >= 7.0 && m.cleanReadingPct >= 65) return 'flowing';
  if (m.articulationRate >= 5.5 && m.cleanReadingPct >= 50) return 'steady';
  if (m.articulationRate >= 4.0) return 'developing';
  if (m.articulationRate > 0) return 'early';
  return 'unknown';
}

const PROFILE_LABELS = { early:'Að fóta sig', developing:'Á leiðinni', steady:'Orðið stöðugra', flowing:'Flæðandi', mixed:'Blandað', unknown:'Engin túlkun' };
const PROFILE_COLORS = { early:'#f87171', developing:'#fbbf24', steady:'#60a5fa', flowing:'#4ade80', mixed:'#c084fc', unknown:'#94a3b8' };
function qualityClass(q) { return q === 'good' ? 'admin-quality-good' : q === 'fair' ? 'admin-quality-fair' : q === 'poor' ? 'admin-quality-poor' : ''; }
function esc(v) { return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dateLabel(v) {
  if (!v) return '—';
  if (typeof v === 'string') return v;
  try { return new Date(v).toLocaleDateString('is-IS'); } catch { return String(v); }
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════

window.tryLogin = function() {
  const code = document.getElementById('admin-code-input').value.trim();
  const err = document.getElementById('auth-error');
  if (code !== ADMIN_CODE) { err.textContent = 'Rangur kóði'; return; }
  err.textContent = '';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('admin-page').style.display = 'block';
  loadData();
};

window.doLogout = function() {
  _sessions = []; _families = {}; _lastDoc = null; _hasMore = true;
  document.getElementById('admin-page').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('admin-code-input').value = '';
};

document.getElementById('admin-code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.tryLogin();
});

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════

const TABS = [
  { id:'overview',  icon:'📊', label:'Yfirlit' },
  { id:'sessions',  icon:'🗂️', label:'Lotur' },
  { id:'families',  icon:'👥', label:'Fjölskyldur' },
  { id:'insights',  icon:'📈', label:'Innsýn' }
];

function renderNav() {
  document.getElementById('admin-nav').innerHTML = TABS.map(t =>
    `<div class="admin-nav-item ${t.id===_activeTab?'active':''}" onclick="switchTab('${t.id}')">
      <div>${t.icon}</div><div>${t.label}</div>
    </div>`
  ).join('');
}

window.switchTab = function(tab) {
  _activeTab = tab;
  renderNav();
  renderContent();
};

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════

async function loadData() {
  const el = document.getElementById('admin-content');
  el.innerHTML = '<div class="admin-loading">Hleð gögnum...</div>';
  document.getElementById('admin-date-chip').textContent = '📅 ' + new Date().toLocaleDateString('is-IS');
  renderNav();

  try {
    const firestore = initFirebase();
    const snap = await firestore.collection('sessions')
      .orderBy('timestamp', 'desc')
      .limit(PAGE_SIZE)
      .get();

    _sessions = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    _totalCount = _sessions.length;
    _lastDoc = snap.docs[snap.docs.length - 1] || null;
    _hasMore = snap.docs.length === PAGE_SIZE;

    buildFamilies();
    renderContent();
  } catch (e) {
    console.error('Admin load failed:', e);
    el.innerHTML = `<div class="admin-loading" style="color:#f87171">Villa: ${esc(e.message)}</div>`;
  }
}

window.loadMore = async function() {
  if (!_hasMore || !_lastDoc) return;
  try {
    const firestore = initFirebase();
    const snap = await firestore.collection('sessions')
      .orderBy('timestamp', 'desc')
      .startAfter(_lastDoc)
      .limit(PAGE_SIZE)
      .get();
    const newDocs = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    _sessions = _sessions.concat(newDocs);
    _lastDoc = snap.docs[snap.docs.length - 1] || null;
    _hasMore = snap.docs.length === PAGE_SIZE;
    buildFamilies();
    renderContent();
  } catch (e) { console.error('Load more failed:', e); }
};

function buildFamilies() {
  _families = {};
  _sessions.forEach(s => {
    if (!s.familyId) return;
    if (!_families[s.familyId]) _families[s.familyId] = { sessions: [], children: new Set() };
    _families[s.familyId].sessions.push(s);
    if (s.childName) _families[s.familyId].children.add(s.childName);
  });
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════

function renderContent() {
  const el = document.getElementById('admin-content');
  if (_activeTab === 'overview')  el.innerHTML = renderOverview();
  if (_activeTab === 'sessions')  el.innerHTML = renderSessions();
  if (_activeTab === 'families')  el.innerHTML = renderFamilies();
  if (_activeTab === 'insights')  el.innerHTML = renderInsights();
}

// ── KPIs ──
function computeKPIs() {
  const totalFamilies = Object.keys(_families).length;
  const totalMins = Math.round(_sessions.reduce((a,s) => a+(s.seconds||0),0)/60);
  const withAnalysis = _sessions.filter(s => s.analysis?.overall).length;
  const withAudio = _sessions.filter(s => s.hasAudio).length;
  const analyzed = _sessions.filter(s => s.analysis?.overall);
  const avgUsable = analyzed.length
    ? (analyzed.reduce((a,s) => a+(s.analysis.overall.usableCount||0),0)/analyzed.length).toFixed(1) : '—';
  const scoreSessions = analyzed.filter(s => (s.analysis?.overall?.avgScore||0) > 0);
  const avgScore = scoreSessions.length
    ? (scoreSessions.reduce((a,s) => a+(s.analysis.overall.avgScore||0),0)/scoreSessions.length).toFixed(1) : '—';

  const profiles = { early:0, developing:0, steady:0, flowing:0, mixed:0, unknown:0 };
  const qualities = { good:0, fair:0, poor:0 };
  analyzed.forEach(s => {
    const p = getProfile(getMetrics(s));
    if (profiles[p] !== undefined) profiles[p]++;
    const q = s.analysis?.overall?.readingQuality;
    if (q && qualities[q] !== undefined) qualities[q]++;
  });

  return { totalFamilies, totalMins, withAnalysis, withAudio, analyzed, avgUsable, avgScore, profiles, qualities };
}

// ── Overview ──
function renderOverview() {
  const k = computeKPIs();
  const sessionCards = renderSessionCards(k.analyzed.slice(0, 6));
  const familyCards = renderFamilyCards(Object.entries(_families).slice(0, 6));

  return `
    <section class="admin-grid-top">
      ${kpiCard('Fjölskyldur', k.totalFamilies, 'virkir hópar')}
      ${kpiCard('Lotur', _totalCount, 'heildarfjöldi')}
      ${kpiCard('Mínútur', k.totalMins, _hasMore ? '~heildarfjöldi' : 'heildarfjöldi')}
      ${kpiCard('Greindar lotur', k.withAnalysis, 'með greiningu')}
      ${kpiCard('Meðal nothæfar', k.avgUsable, 'klippur á lotu')}
      ${kpiCard('Meðalskor', k.avgScore, 'af 100 mögulegum')}
    </section>

    <section class="admin-summary-row">
      <article class="admin-summary-card">
        <h3>Hljóð og greining</h3>
        <div class="admin-summary-list">
          ${summaryItem('Lotur með hljóð', k.withAudio + ' / ' + _totalCount)}
          ${summaryItem('Greindar lotur', k.withAnalysis + ' / ' + _totalCount)}
          ${summaryItem('Meðal nothæfar klippur', k.avgUsable)}
          ${summaryItem('Meðalskor', k.avgScore)}
        </div>
      </article>
      <article class="admin-summary-card">
        <h3>Lestrarstíll</h3>
        <div class="admin-dist-stack">
          ${distBar('Að fóta sig', k.profiles.early, '#f87171', k.analyzed.length)}
          ${distBar('Á leiðinni', k.profiles.developing, '#fbbf24', k.analyzed.length)}
          ${distBar('Orðið stöðugra', k.profiles.steady, '#60a5fa', k.analyzed.length)}
          ${distBar('Flæðandi', k.profiles.flowing, '#4ade80', k.analyzed.length)}
          ${distBar('Blandað', k.profiles.mixed, '#c084fc', k.analyzed.length)}
        </div>
      </article>
      <article class="admin-summary-card">
        <h3>Lestrargæði</h3>
        <div class="admin-dist-stack">
          ${distBar('Good', k.qualities.good, '#4ade80', k.analyzed.length)}
          ${distBar('Fair', k.qualities.fair, '#fbbf24', k.analyzed.length)}
          ${distBar('Poor', k.qualities.poor, '#f87171', k.analyzed.length)}
        </div>
      </article>
    </section>

    <section class="admin-section">
      <div class="admin-section-head">
        <div>
          <h2 class="admin-section-title">Nýjustu lotur með greiningu</h2>
          <p>Yfirlit yfir nýlegar lestrarlotur og lykilmælikvarða.</p>
        </div>
        <div class="admin-action-link" onclick="switchTab('sessions')">Sjá allar lotur →</div>
      </div>
      <div class="admin-sessions-grid">
        ${sessionCards || '<p class="admin-empty">Engar greindar lotur enn.</p>'}
      </div>
    </section>

    <section class="admin-section">
      <div class="admin-section-head">
        <div>
          <h2 class="admin-section-title">Fjölskyldur / hópar</h2>
          <p>Ópersónugreinanleg yfirlit.</p>
        </div>
        <div class="admin-action-link" onclick="switchTab('families')">Sjá alla hópa →</div>
      </div>
      <div class="admin-family-grid">
        ${familyCards || '<p class="admin-empty">Engar fjölskyldur enn.</p>'}
      </div>
      <div class="admin-footer-note">Gögn eru dulkóðuð og ópersónugreinanleg.</div>
    </section>`;
}

// ── Sessions tab ──
function renderSessions() {
  const analyzed = _sessions.filter(s => s.analysis?.overall);
  const all = _sessions;
  return `
    <section>
      <div class="admin-section-head">
        <div>
          <h2 class="admin-section-title">Allar lotur (${_totalCount})</h2>
          <p>Sýnir ${_sessions.length} af ${_totalCount} lotum.</p>
        </div>
      </div>
      <div class="admin-sessions-grid">
        ${renderSessionCards(analyzed.slice(0, 30)) || '<p class="admin-empty">Engar greindar lotur enn.</p>'}
      </div>
      ${_hasMore ? '<button class="admin-load-more" onclick="loadMore()">Hlaða fleiri lotum →</button>' : ''}
    </section>`;
}

// ── Families tab ──
function renderFamilies() {
  const entries = Object.entries(_families);
  return `
    <section>
      <div class="admin-section-head">
        <div>
          <h2 class="admin-section-title">Fjölskyldur (${entries.length})</h2>
        </div>
      </div>
      <div class="admin-family-grid">
        ${renderFamilyCards(entries) || '<p class="admin-empty">Engar fjölskyldur enn.</p>'}
      </div>
    </section>`;
}

// ── Insights tab ──
function renderInsights() {
  const k = computeKPIs();
  const analyzed = k.analyzed;
  if (!analyzed.length) return '<p class="admin-empty" style="padding:24px">Engin gögn til greiningar enn.</p>';

  const allMetrics = analyzed.map(s => getMetrics(s)).filter(m => m.syllables > 0);
  const avgSyl = allMetrics.length ? Math.round(allMetrics.reduce((a,m)=>a+m.syllables,0)/allMetrics.length) : 0;
  const avgClean = allMetrics.length ? (allMetrics.reduce((a,m)=>a+m.cleanReadingPct,0)/allMetrics.length).toFixed(1) : 0;
  const avgArt = allMetrics.length ? (allMetrics.reduce((a,m)=>a+m.articulationRate,0)/allMetrics.length).toFixed(2) : 0;
  const avgFormant = allMetrics.length ? (allMetrics.reduce((a,m)=>a+m.meanF1Variation,0)/allMetrics.length).toFixed(1) : 0;

  const last7 = analyzed.filter(s => (s.timestamp||0) > Date.now() - 7*86400000);
  const last30 = analyzed.filter(s => (s.timestamp||0) > Date.now() - 30*86400000);

  return `
    <section class="admin-grid-top" style="grid-template-columns:repeat(4,minmax(0,1fr))">
      ${kpiCard('Meðal atkvæði', avgSyl, 'syllables')}
      ${kpiCard('Meðal hreinn lestur', avgClean + '%', 'cleanReadingPct')}
      ${kpiCard('Meðal talhraði', avgArt, 'articulationRate')}
      ${kpiCard('Meðal formendabr.', avgFormant, 'F1 variation')}
    </section>

    <section class="admin-summary-row" style="grid-template-columns:1fr 1fr">
      <article class="admin-summary-card">
        <h3>Síðustu 7 dagar</h3>
        <div class="admin-summary-list">
          ${summaryItem('Lotur', last7.length)}
          ${summaryItem('Mínútur', Math.round(last7.reduce((a,s)=>a+(s.seconds||0),0)/60))}
          ${summaryItem('Fjölskyldur', new Set(last7.map(s=>s.familyId).filter(Boolean)).size)}
        </div>
      </article>
      <article class="admin-summary-card">
        <h3>Síðustu 30 dagar</h3>
        <div class="admin-summary-list">
          ${summaryItem('Lotur', last30.length)}
          ${summaryItem('Mínútur', Math.round(last30.reduce((a,s)=>a+(s.seconds||0),0)/60))}
          ${summaryItem('Fjölskyldur', new Set(last30.map(s=>s.familyId).filter(Boolean)).size)}
        </div>
      </article>
    </section>

    <section class="admin-summary-row" style="grid-template-columns:1fr">
      <article class="admin-summary-card">
        <h3>Lestrarstíll — dreifing</h3>
        <div class="admin-dist-stack">
          ${distBar('Að fóta sig', k.profiles.early, '#f87171', analyzed.length)}
          ${distBar('Á leiðinni', k.profiles.developing, '#fbbf24', analyzed.length)}
          ${distBar('Orðið stöðugra', k.profiles.steady, '#60a5fa', analyzed.length)}
          ${distBar('Flæðandi', k.profiles.flowing, '#4ade80', analyzed.length)}
          ${distBar('Blandað', k.profiles.mixed, '#c084fc', analyzed.length)}
        </div>
      </article>
    </section>`;
}

// ══════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════

function kpiCard(label, value, sub) {
  return `<article class="admin-kpi-card">
    <div class="admin-kpi-label">${esc(label)}</div>
    <div class="admin-kpi-value">${esc(value)}</div>
    <div class="admin-kpi-sub">${esc(sub)}</div>
  </article>`;
}

function summaryItem(label, value) {
  return `<div class="admin-summary-item"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`;
}

function distBar(label, count, color, total) {
  const pct = total > 0 ? Math.round(count / total * 100) : 0;
  return `<div class="admin-dist-item">
    <div class="admin-dist-head"><span>${esc(label)}</span><strong>${count} (${pct}%)</strong></div>
    <div class="admin-bar"><span style="width:${pct}%;background:${color}"></span></div>
  </div>`;
}

function renderSessionCards(sessions) {
  return sessions.map(s => {
    const a = s.analysis;
    const m = getMetrics(s);
    const prof = getProfile(m);
    const q = a?.overall?.readingQuality || '—';
    const score = a?.overall?.avgScore ?? '—';
    const usable = a?.overall?.usableCount ?? 0;
    const total = a?.overall?.totalSnippets ?? '?';
    return `
      <article class="admin-session-card">
        <div class="admin-session-top">
          <div class="admin-session-name">
            <div class="admin-avatar">👤</div>
            <div>${esc(s.childName||'?')}</div>
          </div>
          <div class="admin-date-pill">${esc(dateLabel(s.date||s.timestamp))}</div>
        </div>
        <div class="admin-meta-line">
          <span>Skor: ${esc(score)}</span>
          <span>Nothæf: ${esc(usable)} / ${esc(total)}</span>
          <span class="${qualityClass(q)}">Gæði: ${esc(q)}</span>
        </div>
        <div>
          <div class="admin-session-label">Admin flokkur</div>
          <div class="admin-profile-text" style="color:${PROFILE_COLORS[prof]}">${esc(PROFILE_LABELS[prof])}</div>
        </div>
        <div class="admin-metrics-grid">
          <div class="admin-metric"><div class="admin-metric-label">Atkvæði</div><div class="admin-metric-value">${esc(m.syllables||'—')}</div></div>
          <div class="admin-metric"><div class="admin-metric-label">Hreinn lestur</div><div class="admin-metric-value">${m.cleanReadingPct ? m.cleanReadingPct+'%' : '—'}</div></div>
          <div class="admin-metric"><div class="admin-metric-label">Talhraði</div><div class="admin-metric-value">${esc(m.articulationRate||'—')}</div></div>
          <div class="admin-metric"><div class="admin-metric-label">F1 breytil.</div><div class="admin-metric-value">${esc(m.meanF1Variation||'—')}</div></div>
        </div>
      </article>`;
  }).join('');
}

function renderFamilyCards(entries) {
  return entries.map(([fid, fam], idx) => {
    const famMins = Math.round(fam.sessions.reduce((a,s)=>a+(s.seconds||0),0)/60);
    const famAnalyzed = fam.sessions.filter(s => s.analysis?.overall);
    const famAvgScore = famAnalyzed.length
      ? (famAnalyzed.reduce((a,s)=>a+(s.analysis?.overall?.avgScore||0),0)/famAnalyzed.length).toFixed(1) : '—';
    const childCount = fam.children.size;
    const label = `Hópur ${String.fromCharCode(65+(idx%26))}`;
    const lastTs = fam.sessions[0]?.timestamp || null;
    let lastActive = 'engin virkni';
    if (lastTs) {
      const days = Math.max(0, Math.floor((Date.now()-lastTs)/86400000));
      lastActive = days === 0 ? 'virkni í dag' : `${days} daga síðan`;
    }
    return `
      <article class="admin-family-card-v2">
        <div>
          <div class="admin-family-code">${esc(fid)}</div>
          <div class="admin-family-name">${esc(label)}</div>
          <div class="admin-family-meta">${childCount} ${childCount===1?'barn':'börn'} · ${esc(lastActive)}</div>
        </div>
        <div class="admin-family-score"><span style="width:${famAvgScore==='—'?0:Math.max(0,Math.min(100,Number(famAvgScore)))}%"></span></div>
        <div class="admin-family-bottom">
          <span>${fam.sessions.length} lotur</span>
          <span>${famMins} mínútur</span>
        </div>
      </article>`;
  }).join('');
}
</script>
